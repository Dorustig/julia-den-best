<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard · Julia Besten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif; color: #1F2937; min-height: 100vh;
      background: linear-gradient(135deg, #FFF1F7 0%, #FFE4EF 50%, #FFEDE4 100%);
      padding: 20px 16px 40px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }

    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding: 0 4px; }
    .brand { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #E91E8C; }
    .topbar-actions { display: flex; gap: 4px; }
    .btn-ghost { background: none; border: none; color: #9CA3AF; font-size: 13px; cursor: pointer; font-family: inherit; padding: 6px 10px; border-radius: 8px; }
    .btn-ghost:hover { color: #E91E8C; background: rgba(233,30,140,0.06); }

    /* Goal progress bar (onder de stats) */
    .goal-bar-wrap { background: #fff; border-radius: 14px; padding: 14px 16px; margin-top: 10px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(233,30,140,0.06); }
    .goal-bar-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-size: 13px; }
    .goal-bar-head .lbl { color: #6B7280; font-weight: 500; }
    .goal-bar-head .pct { color: #E91E8C; font-weight: 700; font-family: 'Playfair Display', serif; font-size: 18px; }
    .goal-bar { height: 10px; background: #F3F4F6; border-radius: 5px; overflow: hidden; position: relative; }
    .goal-bar-fill { height: 100%; background: linear-gradient(90deg, #F472B6, #E91E8C); border-radius: 5px; transition: width 0.5s ease; }
    .goal-bar-ends { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #9CA3AF; }

    /* Account modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,15,20,0.5); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 100; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 0; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.25); max-height: calc(100vh - 80px); overflow: hidden; display: flex; flex-direction: column; }
    .modal-head { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
    .modal-head h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #1F2937; }
    .modal-close { background: none; border: none; font-size: 24px; color: #9CA3AF; cursor: pointer; padding: 4px 8px; line-height: 1; }
    .modal-close:hover { color: #E91E8C; }
    .modal-tabs { display: flex; gap: 4px; padding: 12px 24px 0; border-bottom: 1px solid #F3F4F6; }
    .modal-tab { background: none; border: none; padding: 10px 16px; font-family: inherit; font-size: 14px; font-weight: 600; color: #9CA3AF; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .modal-tab.active { color: #E91E8C; border-bottom-color: #E91E8C; }
    .modal-body { padding: 20px 24px 24px; overflow-y: auto; }
    .modal-body .field { margin-bottom: 14px; }
    .modal-body label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .modal-body input[type=text], .modal-body input[type=tel], .modal-body input[type=number], .modal-body input[type=password] {
      width: 100%; padding: 12px 14px; border: 1.5px solid #E5E7EB; border-radius: 10px;
      font-size: 15px; font-family: inherit; transition: border-color 0.15s;
    }
    .modal-body input:focus { outline: none; border-color: #E91E8C; }
    .modal-body .hint { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
    .modal-submit { width: 100%; padding: 14px 20px; background: #E91E8C; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .modal-submit:hover { background: #D01680; }
    .modal-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-msg { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
    .modal-msg.error { background: #FEE2E2; color: #991B1B; display: block; }
    .modal-msg.success { background: #D1FAE5; color: #065F46; display: block; }
    .pw-row { position: relative; }
    .pw-toggle { position: absolute; right: 8px; top: 32px; background: none; border: none; padding: 6px 10px; color: #9CA3AF; font-size: 12px; font-weight: 500; cursor: pointer; }
    .pw-toggle:hover { color: #E91E8C; }

    .card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 10px 40px rgba(233, 30, 140, 0.08); margin-bottom: 16px; }

    .hero { text-align: center; padding: 28px 24px; background: linear-gradient(135deg, #E91E8C 0%, #F06292 100%); color: #fff; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 12px 32px rgba(233, 30, 140, 0.25); }
    .hero .hi { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .hero .sub { font-size: 14px; opacity: 0.9; margin-bottom: 20px; }
    .hero .week-row { display: flex; align-items: baseline; justify-content: center; gap: 6px; margin-bottom: 14px; }
    .hero .week-num { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 700; line-height: 1; }
    .hero .week-total { font-size: 20px; opacity: 0.85; }
    .hero .week-label { font-size: 13px; opacity: 0.85; letter-spacing: 0.5px; text-transform: uppercase; }
    .hero .progress-bar { height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; margin-top: 14px; overflow: hidden; }
    .hero .progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width 0.4s ease; }
    .hero .end-date { font-size: 12px; opacity: 0.8; margin-top: 10px; }

    .section-title { font-size: 13px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; padding-left: 4px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .stat { background: #fff; border-radius: 14px; padding: 16px 12px; text-align: center; box-shadow: 0 4px 16px rgba(233, 30, 140, 0.06); }
    .stat .label { font-size: 11px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat .val { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: #1F2937; line-height: 1.1; }
    .stat .unit { font-size: 13px; color: #9CA3AF; font-family: 'Inter', sans-serif; font-weight: 500; }
    .stat.highlight { background: #FFF1F7; }
    .stat.highlight .val { color: #E91E8C; }

    .delta { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 10px; margin-top: 4px; }
    .delta.pos { background: #D1FAE5; color: #065F46; }
    .delta.neg { background: #FEE2E2; color: #991B1B; }
    .delta.neutral { background: #F3F4F6; color: #6B7280; }

    .chart-wrap { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(233, 30, 140, 0.08); margin-bottom: 16px; }
    .chart-empty { text-align: center; padding: 30px 16px; color: #9CA3AF; }
    .chart-empty .emoji { font-size: 28px; margin-bottom: 8px; }
    .chart-empty p { font-size: 14px; line-height: 1.5; }

    .cta-btn { display: block; width: 100%; text-align: center; padding: 16px 20px; background: #E91E8C; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: inherit; box-shadow: 0 6px 20px rgba(233, 30, 140, 0.3); transition: all 0.15s; }
    .cta-btn:hover { background: #D01680; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(233, 30, 140, 0.35); }
    .cta-btn.secondary { background: #fff; color: #E91E8C; box-shadow: 0 4px 14px rgba(233, 30, 140, 0.1); }
    .cta-btn.secondary:hover { background: #FFF1F7; }

    .accordion summary { cursor: pointer; font-weight: 600; color: #1F2937; padding: 16px 20px; background: #fff; border-radius: 14px; list-style: none; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 16px rgba(233, 30, 140, 0.06); }
    .accordion summary::-webkit-details-marker { display: none; }
    .accordion summary::after { content: '▾'; color: #9CA3AF; transition: transform 0.2s; }
    .accordion[open] summary::after { transform: rotate(180deg); }
    .accordion[open] summary { border-radius: 14px 14px 0 0; }
    .accordion-body { background: #fff; padding: 8px 20px 20px; border-radius: 0 0 14px 14px; box-shadow: 0 4px 16px rgba(233, 30, 140, 0.06); }
    .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F3F4F6; font-size: 14px; }
    .data-row:last-child { border-bottom: none; }
    .data-row .k { color: #6B7280; }
    .data-row .v { font-weight: 500; color: #1F2937; text-align: right; }

    .loader { display: flex; justify-content: center; padding: 60px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid #FCE7F3; border-top-color: #E91E8C; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg { padding: 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
    .msg.error { background: #FEE2E2; color: #991B1B; }
    .msg.info { background: #DBEAFE; color: #1E40AF; }

    /* Markdown rendering (training + voeding) */
    .md-render { font-size: 14px; line-height: 1.6; color: #1F2937; }
    .md-render h1, .md-render h2, .md-render h3 {
      font-family: 'Playfair Display', serif;
      margin-top: 14px; margin-bottom: 6px; line-height: 1.25;
    }
    .md-render h1 { font-size: 20px; font-weight: 700; }
    .md-render h2 { font-size: 17px; font-weight: 700; color: #E91E8C; }
    .md-render h3 { font-size: 15px; font-weight: 600; }
    .md-render p { margin: 6px 0; }
    .md-render ul { padding-left: 18px; margin: 6px 0; }
    .md-render li { margin: 3px 0; }
    .md-render strong { font-weight: 600; color: #1F2937; }
    .md-render em { font-style: italic; color: #6B7280; }
    .md-render code {
      background: #F3F4F6; padding: 1px 6px; border-radius: 4px;
      font-family: 'SF Mono', Menlo, monospace; font-size: 12.5px;
    }
    .md-render hr { border: none; border-top: 1px solid #F3F4F6; margin: 14px 0; }

    /* Macro's pill */
    .macro-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .macro-pill {
      background: #FFF1F7; color: #BE185D; padding: 7px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px;
    }
    .macro-pill .val { color: #E91E8C; font-family: 'Playfair Display', serif; font-size: 15px; }

    /* Weken accordion (training) */
    .weken-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
    .weken-list .wk-btn {
      text-align: center; padding: 10px 6px; border-radius: 10px;
      background: #F9FAFB; color: #9CA3AF; font-size: 13px; font-weight: 600;
      border: 1px solid #F3F4F6; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .weken-list .wk-btn:hover { background: #FFF1F7; color: #E91E8C; }
    .weken-list .wk-btn.has-content { background: #FDF2F8; color: #BE185D; border-color: #FBCFE8; }
    .weken-list .wk-btn.current { background: #E91E8C; color: #fff; border-color: #E91E8C; }
    .empty-plan { text-align: center; color: #9CA3AF; padding: 20px 0; font-size: 14px; }

    /* Foto thumbnails op de check-in historiek */
    .foto-thumbs { display: flex; gap: 6px; margin-top: 8px; }
    .foto-thumb {
      position: relative; width: 54px; height: 54px; border-radius: 8px;
      background-size: cover; background-position: center; background-color: #F3F4F6;
      cursor: pointer; overflow: hidden; border: 1px solid #F3F4F6;
      transition: transform 0.15s ease;
    }
    .foto-thumb:hover { transform: scale(1.04); }
    .foto-thumb .tag {
      position: absolute; bottom: 2px; left: 2px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 9px; letter-spacing: 0.4px; text-transform: uppercase;
      padding: 1px 4px; border-radius: 4px; font-weight: 600;
    }

    /* Reminder banner (Fase 2.6 B) */
    .reminder-banner {
      background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%);
      border: 1px solid #FBCFE8;
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 14px rgba(233,30,140,0.08);
    }
    .reminder-banner .icon { font-size: 22px; }
    .reminder-banner .text { flex: 1; font-size: 14px; color: #831843; line-height: 1.4; }
    .reminder-banner .text strong { display: block; font-size: 15px; margin-bottom: 2px; color: #500724; }
    .reminder-banner a { display: inline-block; background: #E91E8C; color: #fff; text-decoration: none;
      padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; white-space: nowrap; }

    /* Foto voor/na timeline (Fase 2.6 D) */
    .fotovoorna-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    }
    .fotovoorna-col { text-align: center; }
    .fotovoorna-col .col-label {
      font-size: 11px; color: #9CA3AF; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;
    }
    .fotovoorna-stack { display: flex; flex-direction: column; gap: 8px; }
    .fotovoorna-item {
      aspect-ratio: 3/4; background-size: cover; background-position: center;
      background-color: #F3F4F6; border-radius: 10px; position: relative;
      cursor: pointer; overflow: hidden; border: 1px solid #F3F4F6;
      transition: transform 0.15s ease;
    }
    .fotovoorna-item:hover { transform: scale(1.02); }
    .fotovoorna-item .tag-label {
      position: absolute; bottom: 4px; left: 4px; right: 4px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      text-align: center;
    }
    .fotovoorna-empty { color: #D1D5DB; font-size: 12px; padding: 20px 0; text-align: center; }

    /* Video library (Fase 2.6 C) */
    .video-filters {
      display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto;
      padding-bottom: 2px; -webkit-overflow-scrolling: touch;
    }
    .video-filters button {
      padding: 6px 12px; border-radius: 20px; border: 1px solid #F3F4F6;
      background: #fff; color: #6B7280; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
    }
    .video-filters button.active {
      background: #E91E8C; color: #fff; border-color: #E91E8C;
    }
    .video-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    .video-item {
      cursor: pointer; border-radius: 12px; overflow: hidden;
      background: #000; position: relative; aspect-ratio: 16/9;
      transition: transform 0.15s;
    }
    .video-item:hover { transform: scale(1.02); }
    .video-item img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.85; }
    .video-item .play-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .video-item .video-title {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: #fff; font-size: 11px; font-weight: 600; padding: 20px 8px 6px;
      line-height: 1.3;
    }
    .video-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .video-modal.active { display: flex; flex-direction: column; }
    .video-modal iframe { width: 100%; max-width: 960px; aspect-ratio: 16/9; border: 0; border-radius: 10px; }
    .video-modal-title { color: #fff; margin-top: 12px; font-size: 15px; max-width: 960px; text-align: center; }
    .video-modal-close {
      position: absolute; top: 16px; right: 16px; width: 40px; height: 40px;
      border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 22px; cursor: pointer;
    }

    /* Chat (Fase 2.5) */
    .chat-messages {
      max-height: 340px; overflow-y: auto; padding: 4px 2px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-bubble {
      max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px;
      line-height: 1.4; word-wrap: break-word; white-space: pre-wrap;
    }
    .chat-bubble.klant { background: #FDF2F8; color: #831843; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-bubble.coach { background: #F3F4F6; color: #374151; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-meta { font-size: 11px; opacity: 0.55; margin-top: 4px; }
    .chat-input-row {
      display: flex; gap: 8px; margin-top: 10px; padding-top: 12px;
      border-top: 1px solid #F3F4F6;
    }
    .chat-input-row textarea {
      flex: 1; padding: 10px 12px; border: 1px solid #E5E7EB; border-radius: 12px;
      font-family: inherit; font-size: 14px; resize: none; min-height: 44px; max-height: 120px;
    }
    .chat-send-btn {
      padding: 0 18px; background: #E91E8C; color: #fff; border: none; border-radius: 12px;
      font-weight: 600; cursor: pointer; font-family: inherit; font-size: 14px;
    }
    .chat-send-btn:disabled { opacity: 0.5; cursor: default; }
    .chat-empty { text-align: center; color: #9CA3AF; padding: 20px 10px; font-size: 14px; }
    .chat-unread-dot {
      display: inline-block; background: #E91E8C; color: #fff; border-radius: 10px;
      padding: 1px 7px; font-size: 11px; font-weight: 700; margin-left: 6px;
      min-width: 18px; text-align: center;
    }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px; width: 40px; height: 40px;
      border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .hero .week-num { font-size: 48px; }
      .foto-thumb { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="loader"><div class="spinner"></div></div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox(event, true)" aria-label="Sluiten">✕</button>
    <img id="lightboxImg" alt="">
  </div>

  <div class="video-modal" id="videoModal">
    <button class="video-modal-close" onclick="closeVideoModal()" aria-label="Sluiten">✕</button>
    <iframe id="videoIframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="video-modal-title" id="videoModalTitle"></div>
  </div>

  <!-- Account modal: profiel + wachtwoord wijzigen -->
  <div class="modal-overlay" id="accountModal" onclick="if(event.target===this)closeAccount()">
    <div class="modal">
      <div class="modal-head">
        <h2>Account</h2>
        <button class="modal-close" onclick="closeAccount()" aria-label="Sluiten">&times;</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="profiel" onclick="selectAccountTab('profiel')">Profiel</button>
        <button class="modal-tab" data-tab="wachtwoord" onclick="selectAccountTab('wachtwoord')">Wachtwoord</button>
      </div>

      <div class="modal-body" id="tab-profiel">
        <div class="modal-msg" id="profielMsg"></div>
        <form id="profielForm">
          <div class="field">
            <label for="accNaam">Naam</label>
            <input type="text" id="accNaam" required minlength="2" autocomplete="name">
          </div>
          <div class="field">
            <label for="accTel">Telefoon (optioneel)</label>
            <input type="tel" id="accTel" autocomplete="tel" placeholder="+31 6 …">
          </div>
          <div class="field">
            <label for="accDoel">Doelgewicht (kg)</label>
            <input type="number" id="accDoel" step="0.1" min="30" max="200" placeholder="bv. 62.5">
            <div class="hint">Je doel kun je zelf aanpassen. Je startgewicht, leeftijd en overige intake-data lopen via Julia.</div>
          </div>
          <button type="submit" class="modal-submit" id="profielSubmit">Opslaan</button>
        </form>
      </div>

      <div class="modal-body" id="tab-wachtwoord" style="display:none">
        <div class="modal-msg" id="pwMsg"></div>
        <form id="pwForm">
          <div class="field pw-row">
            <label for="pwHuidig">Huidig wachtwoord</label>
            <input type="password" id="pwHuidig" required autocomplete="current-password" style="padding-right:58px">
            <button type="button" class="pw-toggle" data-target="pwHuidig">Toon</button>
          </div>
          <div class="field pw-row">
            <label for="pwNieuw">Nieuw wachtwoord (min. 6 tekens)</label>
            <input type="password" id="pwNieuw" required minlength="6" autocomplete="new-password" style="padding-right:58px">
            <button type="button" class="pw-toggle" data-target="pwNieuw">Toon</button>
          </div>
          <div class="field pw-row">
            <label for="pwNieuw2">Bevestig nieuw wachtwoord</label>
            <input type="password" id="pwNieuw2" required minlength="6" autocomplete="new-password" style="padding-right:58px">
            <button type="button" class="pw-toggle" data-target="pwNieuw2">Toon</button>
          </div>
          <button type="submit" class="modal-submit" id="pwSubmit">Wachtwoord wijzigen</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const wrap = document.getElementById('wrap');
    function render(html) { wrap.innerHTML = html; }
    function renderError(title, detail) {
      render(`
        <div class="card" style="margin-top:40px;">
          <h1 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:12px;">${title}</h1>
          <div class="msg error">${detail || ''}</div>
          <a href="/klant/login" class="cta-btn" style="margin-top:8px;">Terug naar inloggen</a>
        </div>
      `);
    }

    const DOEL_LABEL = {
      afvallen: 'Afvallen',
      billen_aankomen: 'Billen aankomen',
      gespierd_aankomen: 'Gespierd aankomen',
      slanker_worden: 'Slanker worden',
      recomposition: 'Vet kwijt + spieren erbij',
    };
    const LOCATIE_LABEL = { thuis: 'Thuis', gym: 'Sportschool', beide: 'Thuis & sportschool' };
    const ERVARING_LABEL = {
      beginner: 'Beginner (< 6 mnd)',
      gemiddeld: 'Gemiddeld (6 mnd - 2 jaar)',
      gevorderd: 'Gevorderd (2+ jaar)',
    };

    function fmtDate(iso) {
      if (!iso) return '–';
      const d = new Date(iso);
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function main() {
      const cfgRes = await fetch('/api/config');
      if (!cfgRes.ok) throw new Error('Config laden mislukt (HTTP ' + cfgRes.status + ')');
      const cfg = await cfgRes.json();
      if (!cfg.supabase_url || !cfg.supabase_anon_key) throw new Error('Supabase niet geconfigureerd');

      const supabase = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      window.logout = async () => {
        await supabase.auth.signOut();
        window.location.href = '/klant/login';
      };

      // ===== Account modal (profiel + wachtwoord) =====
      window.openAccount = () => {
        const k = window.__klant || {};
        document.getElementById('accNaam').value = k.naam || '';
        document.getElementById('accTel').value = k.telefoon || '';
        document.getElementById('accDoel').value = k.doel_gewicht_kg != null ? k.doel_gewicht_kg : '';
        document.getElementById('profielMsg').className = 'modal-msg';
        document.getElementById('profielMsg').textContent = '';
        document.getElementById('pwMsg').className = 'modal-msg';
        document.getElementById('pwMsg').textContent = '';
        document.getElementById('pwForm').reset();
        selectAccountTab('profiel');
        document.getElementById('accountModal').classList.add('active');
      };
      window.closeAccount = () => {
        document.getElementById('accountModal').classList.remove('active');
      };
      window.selectAccountTab = (tab) => {
        document.querySelectorAll('.modal-tab').forEach(b => {
          b.classList.toggle('active', b.dataset.tab === tab);
        });
        document.getElementById('tab-profiel').style.display = tab === 'profiel' ? 'block' : 'none';
        document.getElementById('tab-wachtwoord').style.display = tab === 'wachtwoord' ? 'block' : 'none';
      };

      // Toon/verberg wachtwoord-velden
      document.querySelectorAll('.pw-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          if (!target) return;
          if (target.type === 'password') { target.type = 'text'; btn.textContent = 'Verberg'; }
          else { target.type = 'password'; btn.textContent = 'Toon'; }
        });
      });

      // Profiel opslaan
      document.getElementById('profielForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('profielMsg');
        const btn = document.getElementById('profielSubmit');
        msg.className = 'modal-msg'; msg.textContent = '';
        btn.disabled = true; btn.textContent = 'Opslaan...';
        try {
          const naam = document.getElementById('accNaam').value.trim();
          const telefoon = document.getElementById('accTel').value.trim();
          const doelRaw = document.getElementById('accDoel').value.trim();
          const payload = {
            naam,
            telefoon: telefoon || null,
            doel_gewicht_kg: doelRaw === '' ? null : parseFloat(doelRaw),
          };
          const r = await fetch('/api/klant/profile', {
            method: 'PUT',
            headers: { ...window.__authHdr, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await r.json();
          if (!r.ok || data.error) throw new Error(data.error || 'Opslaan mislukt');
          window.__klant = data.klant;
          msg.className = 'modal-msg success';
          msg.textContent = '✓ Profiel bijgewerkt. Ververs de pagina om nieuwe waarden in je dashboard te zien.';
        } catch (err) {
          msg.className = 'modal-msg error';
          msg.textContent = err.message;
        } finally {
          btn.disabled = false; btn.textContent = 'Opslaan';
        }
      });

      // Wachtwoord wijzigen — re-authenticate met huidig + updateUser met nieuw
      document.getElementById('pwForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('pwMsg');
        const btn = document.getElementById('pwSubmit');
        msg.className = 'modal-msg'; msg.textContent = '';
        const huidig = document.getElementById('pwHuidig').value;
        const nieuw = document.getElementById('pwNieuw').value;
        const nieuw2 = document.getElementById('pwNieuw2').value;
        if (nieuw.length < 6) { msg.className = 'modal-msg error'; msg.textContent = 'Nieuw wachtwoord moet minstens 6 tekens zijn.'; return; }
        if (nieuw !== nieuw2) { msg.className = 'modal-msg error'; msg.textContent = 'De twee wachtwoorden komen niet overeen.'; return; }
        btn.disabled = true; btn.textContent = 'Bezig...';
        try {
          // 1. Verifieer huidig wachtwoord door opnieuw in te loggen
          const { data: { user } } = await supabase.auth.getUser();
          if (!user?.email) throw new Error('Niet ingelogd');
          const { error: signInErr } = await supabase.auth.signInWithPassword({
            email: user.email, password: huidig,
          });
          if (signInErr) throw new Error('Huidig wachtwoord klopt niet.');
          // 2. Nieuw wachtwoord instellen
          const { error: updErr } = await supabase.auth.updateUser({ password: nieuw });
          if (updErr) throw new Error(updErr.message);

          msg.className = 'modal-msg success';
          msg.textContent = '✓ Wachtwoord gewijzigd. Gebruik dit bij je volgende login.';
          document.getElementById('pwForm').reset();
        } catch (err) {
          msg.className = 'modal-msg error';
          msg.textContent = err.message;
        } finally {
          btn.disabled = false; btn.textContent = 'Wachtwoord wijzigen';
        }
      });

      // ESC sluit modal
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const m = document.getElementById('accountModal');
          if (m && m.classList.contains('active')) closeAccount();
        }
      });

      window.openLightbox = (src) => {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = src;
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      };
      window.closeLightbox = (ev, forced) => {
        // alleen sluiten als de klik op de achtergrond of sluitknop was
        if (!forced && ev && ev.target && ev.target.tagName === 'IMG') return;
        const lb = document.getElementById('lightbox');
        lb.classList.remove('active');
        document.body.style.overflow = '';
      };
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          window.closeLightbox(null, true);
          if (window.closeVideoModal) window.closeVideoModal();
        }
      });
      // Klik op zwarte achtergrond van videomodal => sluiten
      const vm = document.getElementById('videoModal');
      if (vm) vm.addEventListener('click', (e) => {
        if (e.target === vm) window.closeVideoModal();
      });

      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        render(`
          <div class="card" style="margin-top:40px;text-align:center;">
            <h1 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;">Welkom terug</h1>
            <p style="color:#6B7280;margin-bottom:20px;">Log eerst in met je email.</p>
            <a href="/klant/login" class="cta-btn">Naar inloggen</a>
          </div>
        `);
        return;
      }

      const authHdr = { Authorization: 'Bearer ' + session.access_token };
      const [r, cr, tr, vr, chr, vidR] = await Promise.all([
        fetch('/api/klant/me', { headers: authHdr }),
        fetch('/api/klant/checkins', { headers: authHdr }),
        fetch('/api/klant/training-schemas', { headers: authHdr }),
        fetch('/api/klant/voeding-plan', { headers: authHdr }),
        fetch('/api/klant/chat', { headers: authHdr }),
        fetch('/api/klant/videos', { headers: authHdr }),
      ]);

      if (r.status === 404) {
        render(`
          <div class="card" style="margin-top:40px;">
            <h1 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:12px;">Welkom</h1>
            <div class="msg error">Er is nog geen klant-profiel voor deze email. Als je net betaald hebt, probeer het over een minuutje opnieuw. Anders: neem contact op met Julia.</div>
            <a href="mailto:julia@juliabesten.nl" class="cta-btn">Stuur Julia een mailtje</a>
          </div>
        `);
        return;
      }
      if (!r.ok) throw new Error('Profiel ophalen mislukt (HTTP ' + r.status + ')');

      const { klant } = await r.json();
      window.__klant = klant; // gebruikt door Account-modal om velden te pre-fillen
      const checkins = (cr && cr.ok ? (await cr.json()).check_ins : []) || [];
      const trainingSchemas = (tr && tr.ok ? (await tr.json()).schemas : []) || [];
      const voedingPlan = (vr && vr.ok ? (await vr.json()).plan : null);
      const chatData = (chr && chr.ok ? await chr.json() : { messages: [], unread: 0 });
      const videos = (vidR && vidR.ok ? (await vidR.json()).videos : []) || [];
      window.__trainingSchemas = trainingSchemas;
      window.__chatMessages = chatData.messages || [];
      window.__chatUnread = chatData.unread || 0;
      window.__videos = videos;
      window.__authHdr = authHdr;

      // Niet klaar met intake? Doorsturen.
      if (klant.status === 'onboarding' || !klant.doel || !klant.start_gewicht_kg) {
        window.location.href = '/klant/intake';
        return;
      }

      // Week berekening
      const startMs = new Date(klant.start_datum).getTime();
      const nowMs = Date.now();
      const msPerWeek = 7 * 24 * 60 * 60 * 1000;
      const weekNum = Math.min(16, Math.max(1, Math.ceil((nowMs - startMs) / msPerWeek)));
      const daysLeft = Math.max(0, Math.ceil((new Date(klant.eind_datum).getTime() - nowMs) / (24 * 60 * 60 * 1000)));
      const progressPct = Math.min(100, (weekNum / 16) * 100);

      // Goal-aware delta: afvallen doelen = daling positief, aankomen = stijging positief
      const afvalDoelen = new Set(['afvallen', 'slanker_worden', 'recomposition']);
      const willDown = afvalDoelen.has(klant.doel);

      const start = klant.start_gewicht_kg;
      const doel = klant.doel_gewicht_kg;
      const hasGoal = doel != null;
      const laatste = checkins.length ? checkins[checkins.length - 1] : null;
      const huidig = laatste ? parseFloat(laatste.gewicht_kg) : start;
      const delta = +(huidig - start).toFixed(1);

      // Voortgang naar doel (0-100%).
      // Voor afvallen: (start - huidig) / (start - doel)
      // Voor aankomen: (huidig - start) / (doel - start)
      let goalPct = null;
      let goalBarHtml = '';
      if (hasGoal && start != null && doel !== start) {
        const totalNeeded = Math.abs(doel - start);
        const achieved = willDown ? (start - huidig) : (huidig - start);
        goalPct = Math.max(0, Math.min(100, (achieved / totalNeeded) * 100));
        const kgToGo = Math.max(0, Math.abs(doel - huidig));
        goalBarHtml = `
          <div class="goal-bar-wrap">
            <div class="goal-bar-head">
              <span class="lbl">${goalPct >= 100 ? '&#127881; Doel behaald!' : `Nog <strong>${kgToGo.toFixed(1)} kg</strong> tot je doel`}</span>
              <span class="pct">${Math.round(goalPct)}%</span>
            </div>
            <div class="goal-bar"><div class="goal-bar-fill" style="width:${goalPct}%"></div></div>
            <div class="goal-bar-ends"><span>${start} kg</span><span>${doel} kg</span></div>
          </div>
        `;
      }

      let deltaBadge = '<span class="delta neutral">Start</span>';
      if (delta !== 0) {
        const goodDirection = (willDown && delta < 0) || (!willDown && delta > 0);
        const cls = goodDirection ? 'pos' : 'neg';
        deltaBadge = `<span class="delta ${cls}">${delta > 0 ? '+' : ''}${delta.toFixed(1)} kg</span>`;
      } else if (laatste) {
        deltaBadge = '<span class="delta neutral">±0 kg</span>';
      }

      // Heeft klant deze week al een check-in gedaan?
      const weekStart = new Date(Date.now() - (weekNum - 1) * msPerWeek - new Date().getDay() * 86400000);
      const thisWeekCheckIn = laatste && (Date.now() - new Date(laatste.datum).getTime()) < msPerWeek;

      // Reminder-banner (Fase 2.6 B) — laat zien als geen check-in of >7 dagen
      const daysSinceCheckIn = laatste ? Math.floor((Date.now() - new Date(laatste.datum).getTime()) / 86400000) : null;
      let reminderHtml = '';
      if (!laatste) {
        reminderHtml = `
          <div class="reminder-banner">
            <div class="icon">✨</div>
            <div class="text">
              <strong>Tijd voor je eerste check-in</strong>
              Start vandaag met je 16-weken reis — het duurt maar 2 minuten.
            </div>
            <a href="/klant/checkin">Start</a>
          </div>`;
      } else if (daysSinceCheckIn > 7) {
        reminderHtml = `
          <div class="reminder-banner">
            <div class="icon">⏰</div>
            <div class="text">
              <strong>Tijd voor je wekelijkse check-in</strong>
              ${daysSinceCheckIn} dagen geleden — even bijwerken houdt je op koers.
            </div>
            <a href="/klant/checkin">Check-in</a>
          </div>`;
      }

      const naam = escapeHtml((klant.naam || '').split(' ')[0] || 'daar');

      render(`
        <div class="topbar">
          <div class="brand">Julia Besten</div>
          <div class="topbar-actions">
            <button class="btn-ghost" onclick="openAccount()" title="Account">&#9881;&#65039; Account</button>
            <button class="btn-ghost" onclick="logout()">Uitloggen</button>
          </div>
        </div>

        ${reminderHtml}

        <div class="hero">
          <div class="hi">Hoi ${naam} ✨</div>
          <div class="sub">Jouw 16-weken traject</div>
          <div class="week-row">
            <span class="week-num">${weekNum}</span>
            <span class="week-total">/ 16</span>
          </div>
          <div class="week-label">Week ${weekNum} van 16</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
          <div class="end-date">Einddatum: ${fmtDate(klant.eind_datum)} · nog ${daysLeft} dagen</div>
        </div>

        <div class="section-title">Jouw voortgang</div>
        <div class="stats-grid" style="margin-bottom:${goalBarHtml ? '0' : '20px'};">
          <div class="stat">
            <div class="label">Start</div>
            <div class="val">${start}<span class="unit"> kg</span></div>
          </div>
          <div class="stat highlight">
            <div class="label">Huidig</div>
            <div class="val">${huidig}<span class="unit"> kg</span></div>
            ${deltaBadge}
          </div>
          <div class="stat">
            <div class="label">Doel</div>
            <div class="val">${hasGoal ? doel : '–'}<span class="unit">${hasGoal ? ' kg' : ''}</span></div>
          </div>
        </div>
        ${goalBarHtml}

        <div class="chart-wrap">
          <div class="section-title" style="padding-left:0;margin-bottom:6px;">Gewichts-verloop</div>
          ${checkins.length === 0 ? `
            <div class="chart-empty">
              <div class="emoji">📈</div>
              <p>Je eerste check-in wacht op je.<br>Daarna zie je hier je progressie.</p>
            </div>
          ` : `<div id="chart"></div>`}
        </div>

        <a href="/klant/checkin" class="cta-btn" style="margin-bottom:20px;">${thisWeekCheckIn ? '✨ Check-in updaten' : '📸 Doe je wekelijkse check-in'}</a>

        ${renderChatCard(chatData.messages || [], chatData.unread || 0)}

        ${renderTrainingCard(trainingSchemas, weekNum)}
        ${renderVoedingCard(voedingPlan)}
        ${renderFotoTimelineCard(checkins)}
        ${renderVideoLibraryCard(videos)}

        ${checkins.length > 0 ? `
        <div class="section-title">Check-in historiek</div>
        <div class="card" style="padding:8px 0;margin-bottom:20px;">
          ${checkins.slice().reverse().slice(0, 6).map(c => {
            const wk = Math.min(16, Math.max(1, Math.floor((new Date(c.datum).getTime() - startMs) / msPerWeek) + 1));
            const d = new Date(c.datum).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
            const fotos = Array.isArray(c.fotos) ? c.fotos.filter(f => f && f.signed_url) : [];
            // sorteer consistent: front, side, back
            const order = { front: 0, side: 1, back: 2 };
            fotos.sort((a, b) => (order[a.positie] ?? 9) - (order[b.positie] ?? 9));
            const fotosHtml = fotos.length ? `
              <div class="foto-thumbs">
                ${fotos.map(f => `
                  <div class="foto-thumb"
                       style="background-image:url('${f.signed_url}');"
                       onclick="openLightbox('${f.signed_url}')"
                       title="${f.positie}">
                    <span class="tag">${f.positie}</span>
                  </div>
                `).join('')}
              </div>
            ` : '';
            return `
              <div style="padding:12px 20px;border-bottom:1px solid #F3F4F6;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <div>
                    <div style="font-weight:600;font-size:14px;">Week ${wk} · ${d}</div>
                    <div style="font-size:12px;color:#9CA3AF;margin-top:2px;">
                      ${c.mood ? '😊 ' + c.mood + '/10  ' : ''}
                      ${c.energie ? '⚡ ' + c.energie + '/10  ' : ''}
                      ${c.stappen ? '👣 ' + c.stappen.toLocaleString('nl-NL') : ''}
                    </div>
                  </div>
                  <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#E91E8C;">${parseFloat(c.gewicht_kg).toFixed(1)}<span style="font-size:13px;color:#9CA3AF;font-family:'Inter',sans-serif;"> kg</span></div>
                </div>
                ${fotosHtml}
              </div>
            `;
          }).join('')}
        </div>
        ` : ''}

        <div class="section-title">Jouw gegevens</div>
        <details class="accordion">
          <summary>Intake-gegevens bekijken</summary>
          <div class="accordion-body">
            <div class="data-row"><span class="k">Doel</span><span class="v">${DOEL_LABEL[klant.doel] || klant.doel}</span></div>
            <div class="data-row"><span class="k">Startgewicht</span><span class="v">${klant.start_gewicht_kg} kg</span></div>
            <div class="data-row"><span class="k">Doelgewicht</span><span class="v">${klant.doel_gewicht_kg ? klant.doel_gewicht_kg + ' kg' : '–'}</span></div>
            <div class="data-row"><span class="k">Lengte</span><span class="v">${klant.lengte_cm || '–'} cm</span></div>
            <div class="data-row"><span class="k">Leeftijd</span><span class="v">${klant.leeftijd || '–'} jaar</span></div>
            <div class="data-row"><span class="k">Training</span><span class="v">${LOCATIE_LABEL[klant.training_locatie] || klant.training_locatie}</span></div>
            <div class="data-row"><span class="k">Dagen per week</span><span class="v">${klant.trainingsdagen_per_week || '–'}</span></div>
            <div class="data-row"><span class="k">Ervaring</span><span class="v">${ERVARING_LABEL[klant.ervaring_niveau] || klant.ervaring_niveau || '–'}</span></div>
            <div class="data-row"><span class="k">Startdatum</span><span class="v">${fmtDate(klant.start_datum)}</span></div>
            <div class="data-row"><span class="k">Einddatum</span><span class="v">${fmtDate(klant.eind_datum)}</span></div>
            ${klant.allergieen ? `<div class="data-row"><span class="k">Allergieën / blessures</span><span class="v" style="max-width:60%;">${escapeHtml(klant.allergieen)}</span></div>` : ''}
            <p style="font-size:12px;color:#9CA3AF;margin-top:14px;">Klopt iets niet? Laat het Julia weten via WhatsApp of email.</p>
          </div>
        </details>
      `);

      // Chart renderen (als er check-ins zijn)
      if (checkins.length > 0) {
        const chartEl = document.getElementById('chart');
        if (chartEl) drawChart(chartEl, {
          startGewicht: start,
          doelGewicht: doel,
          checkIns: checkins,
          willDown,
        });
      }

      // Chat: scroll naar onder + markeer coach-berichten als gelezen
      initChatAfterRender();
    }

    // ===== Simpele markdown renderer =====
    // Ondersteunt: # ## ### headers, - * lijsten, **bold**, *italic*, `code`, blank lines → paragraphs
    function renderMarkdown(md) {
      if (!md) return '';
      const escape = (s) => s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      const lines = String(md).replace(/\r\n/g, '\n').split('\n');
      const out = [];
      let inList = false;
      const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (let raw of lines) {
        const line = raw.trimEnd();
        if (!line.trim()) { flushList(); continue; }
        // Headers
        let m;
        if ((m = line.match(/^###\s+(.*)$/))) { flushList(); out.push(`<h3>${inline(m[1])}</h3>`); continue; }
        if ((m = line.match(/^##\s+(.*)$/)))  { flushList(); out.push(`<h2>${inline(m[1])}</h2>`); continue; }
        if ((m = line.match(/^#\s+(.*)$/)))   { flushList(); out.push(`<h1>${inline(m[1])}</h1>`); continue; }
        // HR
        if (/^---+$/.test(line.trim())) { flushList(); out.push('<hr>'); continue; }
        // Lijst item
        if ((m = line.match(/^\s*[-*]\s+(.*)$/))) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${inline(m[1])}</li>`);
          continue;
        }
        // Anders: paragraaf
        flushList();
        out.push(`<p>${inline(line)}</p>`);
      }
      flushList();
      function inline(s) {
        // escape eerst
        s = escape(s);
        // **bold**
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // *italic*
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
        // `code`
        s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
        return s;
      }
      return out.join('\n');
    }

    // ===== Chat card (Fase 2.5) =====
    function fmtChatTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      if (sameDay) return d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) +
             ' ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
    }

    function renderChatMessagesHTML(messages) {
      if (!messages || !messages.length) {
        return '<div class="chat-empty">Nog geen berichten. Stuur Julia een berichtje &#128071;</div>';
      }
      return messages.map(m => `
        <div class="chat-bubble ${m.van}">
          ${escapeHtml(m.content)}
          <div class="chat-meta">${fmtChatTime(m.created_at)}</div>
        </div>
      `).join('');
    }

    function renderChatCard(messages, unread) {
      const badge = unread > 0 ? `<span class="chat-unread-dot">${unread}</span>` : '';
      return `
        <div class="section-title">💬 Berichten met Julia${badge}</div>
        <div class="card" style="margin-bottom:20px;">
          <div class="chat-messages" id="chatMessages">${renderChatMessagesHTML(messages)}</div>
          <div class="chat-input-row">
            <textarea id="chatInput" placeholder="Bericht naar Julia..." rows="2"
                      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendKlantMessage();}"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendKlantMessage()">Verstuur</button>
          </div>
        </div>
      `;
    }

    // Na render: scroll chat naar onder + markeer coach-berichten als gelezen
    function initChatAfterRender() {
      const box = document.getElementById('chatMessages');
      if (box) box.scrollTop = box.scrollHeight;
      if (window.__chatUnread > 0) {
        fetch('/api/klant/chat/read', {
          method: 'POST', headers: window.__authHdr,
        }).catch(() => {});
      }
    }

    window.sendKlantMessage = async function() {
      const input = document.getElementById('chatInput');
      const btn = document.getElementById('chatSendBtn');
      const txt = (input.value || '').trim();
      if (!txt) return;
      input.disabled = true; btn.disabled = true;
      try {
        const r = await fetch('/api/klant/chat', {
          method: 'POST',
          headers: { ...window.__authHdr, 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: txt }),
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.error || 'HTTP ' + r.status);
        }
        input.value = '';
        await reloadChatMessages();
      } catch (e) {
        alert('Verzenden mislukt: ' + e.message);
      } finally {
        input.disabled = false; btn.disabled = false;
        input.focus();
      }
    };

    async function reloadChatMessages() {
      try {
        const r = await fetch('/api/klant/chat', { headers: window.__authHdr });
        if (!r.ok) return;
        const data = await r.json();
        window.__chatMessages = data.messages || [];
        window.__chatUnread = data.unread || 0;
        const box = document.getElementById('chatMessages');
        if (box) {
          box.innerHTML = renderChatMessagesHTML(window.__chatMessages);
          box.scrollTop = box.scrollHeight;
        }
      } catch {}
    }

    // Polling voor nieuwe coach-berichten — elke 10s
    if (window.__chatPollInterval) clearInterval(window.__chatPollInterval);
    window.__chatPollInterval = setInterval(() => {
      if (document.getElementById('chatMessages')) reloadChatMessages();
    }, 10000);

    // ===== Training card =====
    function renderTrainingCard(schemas, currentWeek) {
      const byWeek = {};
      (schemas || []).forEach(s => { byWeek[s.week_nr] = s; });
      const hasAny = Object.keys(byWeek).length > 0;
      const current = byWeek[currentWeek];

      const weekButtons = Array.from({ length: 16 }, (_, i) => {
        const wk = i + 1;
        const has = !!byWeek[wk];
        const cur = wk === currentWeek;
        return `<button class="wk-btn ${has ? 'has-content' : ''} ${cur ? 'current' : ''}"
                  onclick="showTrainingWeek(${wk})">${wk}</button>`;
      }).join('');

      return `
        <div class="section-title">🏋️ Jouw training</div>
        <div class="card" style="margin-bottom:16px;">
          <div id="trainingDisplay">
            ${current ? `
              <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:18px;margin-bottom:8px;">
                Week ${currentWeek}${current.titel ? ' · ' + escapeHtml(current.titel) : ''}
              </div>
              <div class="md-render">${renderMarkdown(current.content_markdown)}</div>
            ` : hasAny ? `
              <div class="empty-plan">📌 Deze week staat nog geen schema klaar. Klik op een week hieronder om eentje te bekijken.</div>
            ` : `
              <div class="empty-plan">🏋️ Julia zet hier binnenkort je trainingsschema.<br><span style="font-size:12px;color:#9CA3AF;">Je ziet 'm zodra het klaar staat.</span></div>
            `}
          </div>
          ${hasAny ? `
            <div style="margin-top:14px;">
              <div style="font-size:12px;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;">Alle weken</div>
              <div class="weken-list">${weekButtons}</div>
            </div>
          ` : ''}
        </div>
      `;
    }

    window.showTrainingWeek = function(wk) {
      const schemas = window.__trainingSchemas || [];
      const s = schemas.find(x => x.week_nr === wk);
      const display = document.getElementById('trainingDisplay');
      if (!display) return;
      if (!s) {
        display.innerHTML = `<div class="empty-plan">📌 Week ${wk} is nog niet ingevuld.</div>`;
        return;
      }
      display.innerHTML = `
        <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:18px;margin-bottom:8px;">
          Week ${wk}${s.titel ? ' · ' + escapeHtml(s.titel) : ''}
        </div>
        <div class="md-render">${renderMarkdown(s.content_markdown)}</div>
      `;
      // Update current highlight
      document.querySelectorAll('.weken-list .wk-btn').forEach((btn, i) => {
        btn.classList.toggle('current', i + 1 === wk);
      });
    };

    // ===== Voeding card =====
    function renderVoedingCard(plan) {
      if (!plan) {
        return `
          <div class="section-title">🥗 Jouw voeding</div>
          <div class="card" style="margin-bottom:16px;">
            <div class="empty-plan">🥗 Julia stelt binnenkort je voedingsplan op.<br><span style="font-size:12px;color:#9CA3AF;">Je ziet 'm zodra het klaar staat.</span></div>
          </div>
        `;
      }
      const pills = [
        plan.calories != null && `<div class="macro-pill"><span class="val">${plan.calories}</span>kcal</div>`,
        plan.eiwit_g != null && `<div class="macro-pill">Eiwit <span class="val">${plan.eiwit_g}</span>g</div>`,
        plan.koolhydraten_g != null && `<div class="macro-pill">Koolh. <span class="val">${plan.koolhydraten_g}</span>g</div>`,
        plan.vetten_g != null && `<div class="macro-pill">Vet <span class="val">${plan.vetten_g}</span>g</div>`,
      ].filter(Boolean).join('');
      return `
        <div class="section-title">🥗 Jouw voeding</div>
        <div class="card" style="margin-bottom:16px;">
          ${plan.titel ? `<div style="font-family:'Playfair Display',serif;font-weight:700;font-size:18px;margin-bottom:10px;">${escapeHtml(plan.titel)}</div>` : ''}
          ${pills ? `<div class="macro-pills">${pills}</div>` : ''}
          ${plan.content_markdown ? `<div class="md-render">${renderMarkdown(plan.content_markdown)}</div>` : ''}
        </div>
      `;
    }

    // ===== Foto voor/na timeline (Fase 2.6 D) =====
    function fmtDateShort(iso) {
      return new Date(iso).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
    }
    function renderFotoTimelineCard(checkins) {
      const byPos = { front: [], side: [], back: [] };
      (checkins || []).forEach(c => {
        const fotos = Array.isArray(c.fotos) ? c.fotos : [];
        fotos.forEach(f => {
          if (!f || !f.signed_url) return;
          if (byPos[f.positie]) byPos[f.positie].push({ url: f.signed_url, datum: c.datum });
        });
      });
      // Nieuwste eerst per kolom
      ['front','side','back'].forEach(k => byPos[k].sort((a,b) => new Date(b.datum) - new Date(a.datum)));
      const total = byPos.front.length + byPos.side.length + byPos.back.length;
      if (total === 0) return '';

      const renderCol = (pos, label) => {
        const items = byPos[pos];
        if (!items.length) {
          return `
            <div class="fotovoorna-col">
              <div class="col-label">${label}</div>
              <div class="fotovoorna-stack"><div class="fotovoorna-empty">—</div></div>
            </div>`;
        }
        const shown = items.slice(0, 4);
        return `
          <div class="fotovoorna-col">
            <div class="col-label">${label}</div>
            <div class="fotovoorna-stack">
              ${shown.map((f, i) => {
                const tag = i === 0 ? 'Nu' : (i === shown.length - 1 && items.length >= 4 ? fmtDateShort(f.datum) : fmtDateShort(f.datum));
                return `<div class="fotovoorna-item" style="background-image:url('${f.url}')" onclick="openLightbox('${f.url}')"><div class="tag-label">${tag}</div></div>`;
              }).join('')}
            </div>
          </div>`;
      };

      return `
        <div class="section-title">📸 Foto voor/na</div>
        <div class="card" style="margin-bottom:16px;">
          <div class="fotovoorna-grid">
            ${renderCol('front', 'Voorkant')}
            ${renderCol('side', 'Zijkant')}
            ${renderCol('back', 'Achterkant')}
          </div>
        </div>`;
    }

    // ===== Video library (Fase 2.6 C) =====
    function renderVideoLibraryCard(videos) {
      if (!videos || !videos.length) return '';
      const cats = [...new Set(videos.map(v => v.categorie || 'algemeen'))];
      const filterPills = `<button class="active" onclick="filterVideos('all', this)">Alles</button>` +
        cats.map(c => `<button onclick="filterVideos('${escapeHtml(c)}', this)">${escapeHtml(c)}</button>`).join('');

      const grid = videos.map(v => {
        const safeTitle = escapeHtml(v.titel || '');
        const jsTitle = (v.titel || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
          <div class="video-item" data-cat="${escapeHtml(v.categorie || 'algemeen')}" onclick="openVideo('${v.youtube_id}', '${jsTitle}')">
            <img src="https://i.ytimg.com/vi/${v.youtube_id}/hqdefault.jpg" alt="${safeTitle}">
            <div class="play-icon">▶</div>
            <div class="video-title">${safeTitle}</div>
          </div>`;
      }).join('');

      return `
        <div class="section-title">🎬 Video library</div>
        <div class="card" style="margin-bottom:16px;">
          <div class="video-filters" id="videoFilters">${filterPills}</div>
          <div class="video-grid" id="videoGrid">${grid}</div>
        </div>`;
    }

    window.filterVideos = function(cat, btn) {
      document.querySelectorAll('#videoFilters button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.querySelectorAll('#videoGrid .video-item').forEach(item => {
        item.style.display = (cat === 'all' || item.dataset.cat === cat) ? '' : 'none';
      });
    };

    window.openVideo = function(ytId, titel) {
      if (!ytId) return;
      const modal = document.getElementById('videoModal');
      const iframe = document.getElementById('videoIframe');
      const titleEl = document.getElementById('videoModalTitle');
      iframe.src = 'https://www.youtube.com/embed/' + ytId + '?autoplay=1&rel=0';
      if (titleEl) titleEl.textContent = titel || '';
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    };

    window.closeVideoModal = function() {
      const modal = document.getElementById('videoModal');
      const iframe = document.getElementById('videoIframe');
      iframe.src = '';
      modal.classList.remove('active');
      document.body.style.overflow = '';
    };

    function drawChart(el, { startGewicht, doelGewicht, checkIns, willDown }) {
      // SVG area chart — simpel maar mooi
      const W = el.clientWidth || 560;
      const H = 180;
      const P = { top: 16, right: 12, bottom: 28, left: 36 };

      // Datapunten: start + elke check-in
      const points = [
        { datum: null, gewicht: parseFloat(startGewicht), isStart: true },
        ...checkIns.map(c => ({ datum: c.datum, gewicht: parseFloat(c.gewicht_kg) })),
      ];

      const ys = points.map(p => p.gewicht).filter(v => !isNaN(v));
      const withGoal = doelGewicht != null ? [...ys, parseFloat(doelGewicht)] : ys;
      let minY = Math.min(...withGoal);
      let maxY = Math.max(...withGoal);
      const pad = Math.max(1, (maxY - minY) * 0.2);
      minY = Math.floor(minY - pad);
      maxY = Math.ceil(maxY + pad);

      const x = (i) => P.left + (i / Math.max(1, points.length - 1)) * (W - P.left - P.right);
      const y = (v) => P.top + (1 - (v - minY) / (maxY - minY || 1)) * (H - P.top - P.bottom);

      const linePath = points.map((p, i) => (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ',' + y(p.gewicht).toFixed(1)).join(' ');
      const areaPath = linePath + ` L${x(points.length - 1).toFixed(1)},${(H - P.bottom).toFixed(1)} L${x(0).toFixed(1)},${(H - P.bottom).toFixed(1)} Z`;

      const goalLine = doelGewicht != null
        ? `<line x1="${P.left}" y1="${y(parseFloat(doelGewicht))}" x2="${W - P.right}" y2="${y(parseFloat(doelGewicht))}" stroke="#9CA3AF" stroke-dasharray="4 4" stroke-width="1" />
           <text x="${W - P.right - 2}" y="${y(parseFloat(doelGewicht)) - 4}" text-anchor="end" fill="#9CA3AF" font-size="10" font-family="Inter,sans-serif">doel ${doelGewicht} kg</text>`
        : '';

      // Y-axis ticks (3 stuks)
      const ticks = [minY, Math.round((minY + maxY) / 2), maxY];
      const ticksSvg = ticks.map(t => `
        <text x="${P.left - 6}" y="${y(t) + 3}" text-anchor="end" fill="#9CA3AF" font-size="10" font-family="Inter,sans-serif">${t}</text>
        <line x1="${P.left}" y1="${y(t)}" x2="${W - P.right}" y2="${y(t)}" stroke="#F3F4F6" stroke-width="1"/>
      `).join('');

      // Datapunten (cirkels)
      const dots = points.map((p, i) => {
        const cx = x(i), cy = y(p.gewicht);
        const label = p.isStart ? 'Start' : new Date(p.datum).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
        return `
          <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="4" fill="#fff" stroke="#E91E8C" stroke-width="2"/>
          <text x="${cx.toFixed(1)}" y="${(H - P.bottom + 16).toFixed(1)}" text-anchor="middle" fill="#9CA3AF" font-size="10" font-family="Inter,sans-serif">${label}</text>
        `;
      }).join('');

      el.innerHTML = `
        <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;">
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#E91E8C" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${ticksSvg}
          ${goalLine}
          <path d="${areaPath}" fill="url(#areaGrad)"/>
          <path d="${linePath}" stroke="#E91E8C" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
        </svg>
      `;
    }

    main().catch((err) => {
      console.error('[klant-start]', err);
      renderError('Er ging iets mis', err?.message || String(err));
    });
  </script>
</body>
