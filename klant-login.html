<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Inloggen · Julia Besten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif; color: #1F2937; min-height: 100vh;
      background: linear-gradient(135deg, #FFF1F7 0%, #FFE4EF 50%, #FFEDE4 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 40px 32px;
      max-width: 420px; width: 100%;
      box-shadow: 0 20px 60px rgba(233, 30, 140, 0.12);
    }
    .brand { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: #E91E8C; text-align: center; margin-bottom: 6px; }
    .tag { text-align: center; color: #6B7280; font-size: 13px; margin-bottom: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; text-align: center; }
    p.subtitle { color: #6B7280; font-size: 14px; text-align: center; margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type=email], input[type=password], input[type=text] {
      width: 100%; padding: 14px 16px; border: 1.5px solid #E5E7EB; border-radius: 12px;
      font-size: 15px; font-family: inherit; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #E91E8C; }
    button {
      width: 100%; padding: 14px 20px; background: #E91E8C; color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    button:hover { background: #D01680; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px 14px; border-radius: 10px; font-size: 13px; text-align: center; display: none; }
    .msg.success { background: #D1FAE5; color: #065F46; display: block; }
    .msg.error { background: #FEE2E2; color: #991B1B; display: block; }
    .footer-note { margin-top: 24px; text-align: center; font-size: 12px; color: #9CA3AF; }
    .footer-note a { color: #E91E8C; text-decoration: none; }
    .pw-row { position: relative; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; padding: 4px 8px; width: auto;
      color: #9CA3AF; font-size: 12px; font-weight: 500; cursor: pointer;
    }
    .pw-toggle:hover { color: #E91E8C; background: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Julia Besten</div>
    <div class="tag">1-op-1 coaching voor vrouwen</div>
    <h1>Log in</h1>
    <p class="subtitle">Gebruik de inloggegevens die Julia je heeft gestuurd.</p>
    <form id="loginForm">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="jij@voorbeeld.nl">
      </div>
      <div class="field pw-row">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••••" style="padding-right:58px;">
        <button type="button" class="pw-toggle" id="togglePw" aria-label="Toon wachtwoord">Toon</button>
      </div>
      <button type="submit" id="btn">Log in</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="footer-note">
      Wachtwoord vergeten? Mail Julia via <a href="mailto:julia@juliabesten.nl">julia@juliabesten.nl</a> — dan zet zij een nieuwe voor je.
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const cfg = await (await fetch('/api/config')).json();
    const supabase = createClient(cfg.supabase_url, cfg.supabase_anon_key);

    // Al ingelogd? Dan direct door naar dashboard.
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = '/klant/start';
    }

    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const pw = document.getElementById('password');
    const toggle = document.getElementById('togglePw');

    toggle.addEventListener('click', () => {
      if (pw.type === 'password') { pw.type = 'text'; toggle.textContent = 'Verberg'; }
      else { pw.type = 'password'; toggle.textContent = 'Toon'; }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Inloggen...';
      msg.className = 'msg';
      msg.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = pw.value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        msg.className = 'msg error';
        const errMsg = /invalid.*credentials/i.test(error.message)
          ? 'E-mail of wachtwoord klopt niet. Check je welkomstmail van Julia.'
          : ('Inloggen mislukt: ' + error.message);
        msg.textContent = errMsg;
        btn.disabled = false;
        btn.textContent = 'Log in';
        return;
      }
      // Login gelukt — door naar dashboard.
      msg.className = 'msg success';
      msg.textContent = '✓ Ingelogd — je wordt doorgestuurd...';
      setTimeout(() => { window.location.href = '/klant/start'; }, 400);
    });
  </script>
</body>
</html>
